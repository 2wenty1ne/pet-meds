services:
  frontend:
    image: 2wenty1ne/pet-meds-frontend:1.1
    container_name: pet-meds-frontend
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    volumes:
      - static-files:/app/Frontend/dist
    restart: "no"

  backend:
    image: 2wenty1ne/pet-meds-server:1.1
    container_name: pet-meds-server
    build:
      context: ./Server
      dockerfile: Dockerfile
    volumes:
      - static-files:/app/Server/dist:ro
      - sqlite-data:/app/Server/db
      - ./Server/template.json:/app/Server/template.json:ro
    ports:
      - 80:80
    depends_on:
      - frontend
    command: >
      sh -c "/app/Server/validateJson /app/Server/template.json && ./server"

volumes:
  static-files:
  sqlite-data: